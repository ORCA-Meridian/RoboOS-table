# ================================================================
# Galbot-1 Slaver 配置
# 注意：galbot 推理运行在工作站侧，slaver 本身不需要模型
# ================================================================

# Galbot 机器人本机 HTTP 服务（robot_server_clear_table.py 暴露的接口）
galbot_server:
  host: "172.16.20.194"       # 机器人 IP，按实际修改
  port: 9052
  timeout: 10                 # HTTP 请求超时（秒）
  task_poll_interval: 2.0     # 轮询 /api/status 的间隔（秒）
  task_max_wait: 300          # 单步任务最长等待时间（秒），超时则报错

# 相机服务（camera_viewer_1.py 暴露的接口）
camera_server:
  host: "172.16.20.194"       # 与机器人同一台机器
  port: 8080
  snapshot_path: "/snapshot/head"

# Replay 配置
replay:
  parquet_path: "/home/galbot/vla_client/拿毛巾.parquet"
  fps: 30
  speed: 1.0
  step: 15
  no_reset: false              # 跳过关节复位，只走底盘

# 视觉判断模型（VLM）配置
# 必须是支持图像输入的模型。
# 推荐: gpt-4o (OpenAI) 或 gpt-4o-mini（便宜），或支持 vision 的 DeepSeek-VL API
# 注意: 普通 deepseek-chat 不支持图像，这里必须用 vision 模型

vlm:
  # 一次只启用一种服务商。当前默认：百炼 Qwen 的 OpenAI 兼容接口。
  provider: "openai_compatible"
  api_key: "sk-24c26577d05b4b0598acace7c666aadc"
  api_base: "https://llm-yl7qhh3l03qfmpuk.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
  model: "qwen3.7-plus-2026-05-26"
  enable_thinking: false     # 仅 openai_compatible 服务会发送该扩展参数

  # 如需改用官方 OpenAI：注释上方 Qwen 的 provider/api_key/api_base/model/
  # enable_thinking，并取消下面四行注释。启动命令无需变化。
  # provider: "openai"
  # api_key: "sk-wsCXaesxBcVxIBaEC79f3aD05fC24560941261D5CeE420Da"
  # api_base: "https://aihubmix.com/v1"
  # model: "gpt-4o"
  timeout: 120                # VLM 请求超时（秒），发两张图时响应较慢，建议 120
  poll_interval: 3.0
  max_polls: 100              # 最多轮询次数，超过则认为任务超时
  post_done_sleep:
    pick_bag: 10.0        # VLM 判断完成后等待机器人降回正常高度
    bag_large_items: 0.0
    sweep_trash: 0.0
  # 每一步任务完成判断的 prompt
  completion_prompts:
    pick_bag: >
      You are given TWO images. The FIRST image is a reference example showing the
      successfully completed state of this step. The SECOND image is the current camera
      view from the robot. Compare the second image to the first and judge whether the
      current state matches the completed state.
      Answer "yes" only if a trash bag is clearly visible on the RIGHT side of the table
      surface in the SECOND image and is no longer on the floor. The bag should be upright
      or laid on the table, not held by the robot. If the bag is still on the floor, still
      in the robot hand, only partially on the table, not on the right side, occluded, or
      you are uncertain, answer "no".
      Output exactly one word: yes or no.
    bag_large_items: >
      You are given TWO images. The FIRST image is a reference example showing the
      successfully completed state of this step. The SECOND image is the current camera
      view from the robot. Compare the second image to the first and judge whether the
      current state matches the completed state.
      Answer "yes" only if no obvious loose trash remains on the table surface in the
      SECOND image. Loose trash may include any combination of: bottles, cans, milk
      cartons, snack bags, white paper balls, and other miscellaneous trash. Not all
      items are always present — only judge based on what you can actually see.
      The white takeout box containing red lobster shells MUST still remain on the table
      in the SECOND image and must NOT be inside the trash bag yet.
      If any obvious loose trash is still on the table, if the white lobster box has
      already been bagged, if the scene is occluded, or if you are uncertain, answer "no".
      Output exactly one word: yes or no.
    sweep_trash: >
      You are given TWO images. The FIRST image is a reference example showing the
      successfully completed state of this step. The SECOND image is the current camera
      view from the robot. Compare the second image to the first and judge whether the
      current state matches the completed state.
      Answer "yes" only if BOTH of the following are true in the SECOND image:
      (1) the white takeout box is no longer on the table surface — it has been placed
      into the trash bag on the right side of the table, (2) the table surface appears
      mostly clean with no visible red lobster shell fragments or residue remaining.
      Do not require seeing inside the bag. If the white box is still on the table, if
      red lobster debris is still visible on the table, if the scene is occluded, or if
      you are uncertain, answer "no".
      Output exactly one word: yes or no.

# Redis 协作器（与 RoboOS master 通信用）
collaborator:
  host: "127.0.0.1"
  port: 6379
  db: 0
  clear: false
  password: ""

# 机器人注册信息
robot:
  name: "galbot-1"
  call_type: "local"           # skill.py 作为本地 MCP 服务启动
  path: "galbot-1"

# 日志
logger:
  level: "INFO"
  file: ".logs/galbot1_slaver.log"

profiling: true

vlm_driven:
  max_rounds: 200
  decision_timeout: 60
