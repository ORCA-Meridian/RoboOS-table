tool:
  # Has the model undergone targeted training on tool_calls
  support_tool_calls: true   # DeepSeek V3 原生支持 function calling
  # Tool matching configuration
  matching:
    # Maximum number of tools to match for each task
    max_tools: 3
    # Minimum similarity score threshold (0.0 to 1.0)
    min_similarity: 0.1

# Slaver 工具调用模型：把 subtask 自然语言解析成工具调用序列
# 使用 DeepSeek API（纯语言+tool call，无需视觉）
model:
  model_select: "deepseek-v4-pro"
  model_retry_planning: 5
  model_dict:
    cloud_model: "deepseek-v4-pro"
    cloud_type: "default"
    cloud_api_key: "sk-c374f805e1394dc9b4a6b6570282db62"   # ← 填你的 DeepSeek API Key
    cloud_server: "https://api.deepseek.com/"
    max_chat_message: 50

# Collaborator Parameters（Redis，和 Master 保持一致）
collaborator:
  host: "127.0.0.1"
  port: 6379
  db: 0
  clear: false
  password: ""

# Camera Parameters
camera:
  image_path: "images/"

# Robot — 指向 galbot-1/skill.py 暴露的 MCP 工具服务
# skill.py 启动后监听 8000 端口，Slaver 通过 streamable-http 连接
robot:
  name: "galbot-1"          # ← 必须和 skill.py 注册的名字一致
  call_type: remote
  path: "http://127.0.0.1:8000"  # ← skill.py 运行的地址，如果不在同一机器改 IP

profiling: true